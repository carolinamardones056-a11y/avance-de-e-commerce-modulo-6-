<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TienditaBL - Ventas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="asset/css/styles.css">
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">TienditaBL</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="productos.html">Mangas</a></li>
            <li class="nav-item"><a class="nav-link" href="carrito.html">Carrito</a></li>
            <li class="nav-item"><a class="nav-link active" href="ventas.html">Historial Ventas</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <h1>Historial de Ventas</h1>
    <p>Listado de transacciones realizadas en la tienda.</p>
    
    <div class="table-responsive">
      <table class="table table-striped table-hover mt-4">
        <thead class="table-dark">
          <tr>
            <th>ID Venta</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Detalles</th>
          </tr>
        </thead>
        <tbody id="listaVentas">
        </tbody>
      </table>
    </div>
  </main>

  <footer class="mt-auto bg-dark text-white pt-4 pb-4">
    <div class="container text-center">
      <p class="mb-0">&copy; 2025 TienditaBL. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="asset/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('/ventas');
        if (!res.ok) throw new Error('Error al cargar ventas');
        const ventas = await res.json();
        const tbody = document.getElementById('listaVentas');
        tbody.innerHTML = '';
        
        ventas.forEach(v => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${v.id}</td>
            <td>${new Date(v.fecha).toLocaleString()}</td>
            <td>${new Intl.NumberFormat("es-CL", { style: "currency", currency: "CLP", maximumFractionDigits: 0 }).format(v.total)}</td>
            <td>
              <ul class="small mb-0">
                ${v.VentaItems ? v.VentaItems.map(it => `<li>Prod ID: ${it.producto_id.substring(0,8)}... - Cant: ${it.cantidad}</li>`).join('') : 'Sin items'}
              </ul>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error(err);
      }
    });
  </script>
</body>

</html>
